name: Update Badge Status

on:
  workflow_call:
    inputs:
      badge_name:
        description: 'Badge filename (without .json extension)'
        required: true
        type: string
      badge_label:
        description: 'Short label shown on the badge (e.g., GPU, TPU, ROCm)'
        required: true
        type: string
      result:
        description: 'Result of the upstream job (success, failure, cancelled, skipped)'
        required: true
        type: string
      dry_run:
        description: 'Whether the upstream job ran in dry-run mode'
        required: false
        type: string
        default: 'false'
      failure_category:
        description: 'Category of failure from the benchmark workflow (prepare, prereqs, infra, guide, benchmark)'
        required: false
        type: string
        default: ''

jobs:
  update-badge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Classify result
        id: badge
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "color=blue" >> $GITHUB_OUTPUT
            echo "message=dry-run" >> $GITHUB_OUTPUT
            exit 0
          fi

          case "${{ inputs.result }}" in
            success)
              echo "color=brightgreen" >> $GITHUB_OUTPUT
              echo "message=passing" >> $GITHUB_OUTPUT
              ;;
            cancelled)
              # Detect timeout: if the nightly job ran longer than 50 min before cancellation
              IS_TIMEOUT=false
              JOBS_JSON=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" --paginate --jq '.jobs[]' 2>/dev/null || echo "")
              if [ -n "$JOBS_JSON" ]; then
                while IFS= read -r job; do
                  conclusion=$(echo "$job" | jq -r '.conclusion // empty')
                  name=$(echo "$job" | jq -r '.name // empty')
                  echo "$name" | grep -qi "update-badge" && continue
                  if [ "$conclusion" = "cancelled" ]; then
                    started=$(echo "$job" | jq -r '.started_at // empty')
                    completed=$(echo "$job" | jq -r '.completed_at // empty')
                    if [ -n "$started" ] && [ -n "$completed" ]; then
                      start_epoch=$(date -d "$started" +%s 2>/dev/null || echo 0)
                      end_epoch=$(date -d "$completed" +%s 2>/dev/null || echo 0)
                      duration=$((end_epoch - start_epoch))
                      if [ "$duration" -gt 3000 ]; then
                        IS_TIMEOUT=true
                      fi
                    fi
                  fi
                done <<< "$(echo "$JOBS_JSON" | jq -c '.')"
              fi

              if [ "$IS_TIMEOUT" = "true" ]; then
                echo "color=yellow" >> $GITHUB_OUTPUT
                echo "message=timeout" >> $GITHUB_OUTPUT
              else
                echo "color=lightgrey" >> $GITHUB_OUTPUT
                echo "message=cancelled" >> $GITHUB_OUTPUT
              fi
              ;;
            skipped)
              echo "color=lightgrey" >> $GITHUB_OUTPUT
              echo "message=skipped" >> $GITHUB_OUTPUT
              ;;
            failure)
              case "${{ inputs.failure_category }}" in
                prereqs)
                  echo "color=black" >> $GITHUB_OUTPUT
                  echo "message=prereqs-error" >> $GITHUB_OUTPUT
                  ;;
                infra)
                  echo "color=orange" >> $GITHUB_OUTPUT
                  echo "message=infra-error" >> $GITHUB_OUTPUT
                  ;;
                prepare)
                  echo "color=brown" >> $GITHUB_OUTPUT
                  echo "message=prepare-error" >> $GITHUB_OUTPUT
                  ;;
                guide)
                  echo "color=red" >> $GITHUB_OUTPUT
                  echo "message=guide-error" >> $GITHUB_OUTPUT
                  ;;
                benchmark)
                  echo "color=yellow" >> $GITHUB_OUTPUT
                  echo "message=benchmark-error" >> $GITHUB_OUTPUT
                  ;;
                *)
                  echo "color=red" >> $GITHUB_OUTPUT
                  echo "message=failing" >> $GITHUB_OUTPUT
                  ;;
              esac
              ;;
            *)
              echo "color=red" >> $GITHUB_OUTPUT
              echo "message=failing" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Write badge file
        run: |
          mkdir -p badges
          cat > "badges/${{ inputs.badge_name }}.json" <<EOF
          {
            "schemaVersion": 1,
            "label": "${{ inputs.badge_label }}",
            "message": "${{ steps.badge.outputs.message }}",
            "color": "${{ steps.badge.outputs.color }}"
          }
          EOF

      - name: Push badge update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/
          git diff --staged --quiet || git commit -m "badge: update ${{ inputs.badge_name }} (${{ steps.badge.outputs.message }})"
          git push
