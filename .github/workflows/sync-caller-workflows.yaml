# Sync gh-aw Workflows to Consuming Repos
#
# When gh-aw workflow sources (.md) or compiled lock files (.lock.yml) change,
# open PRs on consuming repos with the updated files — pre-compiled, ready to merge.
#
# Consuming repos do NOT need `gh aw compile`. They just merge the PR.
#
# Requires: SYNC_TOKEN repo secret (classic PAT with repo + workflow scopes).

name: Sync gh-aw Workflows to Consuming Repos

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/upstream-monitor.md'
      - '.github/workflows/upstream-monitor.lock.yml'
      - '.github/workflows/link-checker.md'
      - '.github/workflows/link-checker.lock.yml'
      - '.github/workflows/typo-checker.md'
      - '.github/workflows/typo-checker.lock.yml'
      - '.github/aw/actions-lock.json'
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Preview changes without opening PRs'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  # All non-archived repos across llm-d and llm-d-incubation orgs.
  # Excludes: llm-d-infra (source of truth), .github, templates, github.io,
  # llm-d-incubation/llm-d-infra.
  CONSUMING_REPOS: |
    llm-d/llm-d
    llm-d/llm-d-benchmark
    llm-d/llm-d-inference-scheduler
    llm-d/llm-d-inference-sim
    llm-d/llm-d-kv-cache
    llm-d/llm-d-pd-utils
    llm-d/llm-d-prism
    llm-d/llm-d-workload-variant-autoscaler
    llm-d-incubation/batch-gateway
    llm-d-incubation/hermes
    llm-d-incubation/ig-wva
    llm-d-incubation/llm-d-async
    llm-d-incubation/llm-d-ci
    llm-d-incubation/llm-d-fast-model-actuation
    llm-d-incubation/llm-d-modelservice
    llm-d-incubation/secure-inference

  GH_AW_WORKFLOWS: "upstream-monitor link-checker typo-checker"
  SYNC_BRANCH: "sync/gh-aw-workflows"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repo (source of truth)
        uses: actions/checkout@v7

      - name: Sync workflow files to consuming repos
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          set -uo pipefail

          COMMIT_SHA="${GITHUB_SHA:0:7}"
          DRY_RUN="${{ inputs.dry-run || 'false' }}"
          FAIL_COUNT=0

          # Step summary header
          echo "## gh-aw Workflow Sync Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Source: [\`llm-d/llm-d-infra@${COMMIT_SHA}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repo | Status | Details |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|---------|" >> "$GITHUB_STEP_SUMMARY"

          while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            echo "::group::$repo"

            # Clone consuming repo (shallow)
            tmpdir=$(mktemp -d)
            if ! gh repo clone "$repo" "$tmpdir" -- --depth 1 2>&1; then
              echo "| $repo | **Clone failed** | Check SYNC_TOKEN permissions |" >> "$GITHUB_STEP_SUMMARY"
              FAIL_COUNT=$((FAIL_COUNT + 1))
              rm -rf "$tmpdir"
              echo "::endgroup::"
              continue
            fi

            # Skip empty repos (no commits yet — can't create PRs)
            cd "$tmpdir"
            if ! git log -1 --format="%H" >/dev/null 2>&1; then
              echo "| $repo | **Skipped** | Empty repo (no commits) |" >> "$GITHUB_STEP_SUMMARY"
              cd - > /dev/null
              rm -rf "$tmpdir"
              echo "::endgroup::"
              continue
            fi

            # Copy all gh-aw workflow files (.md + .lock.yml) and actions lock
            mkdir -p ".github/workflows" ".github/aw"
            for wf in $GH_AW_WORKFLOWS; do
              cp "${GITHUB_WORKSPACE}/.github/workflows/${wf}.md" ".github/workflows/${wf}.md"
              cp "${GITHUB_WORKSPACE}/.github/workflows/${wf}.lock.yml" ".github/workflows/${wf}.lock.yml"
            done
            cp "${GITHUB_WORKSPACE}/.github/aw/actions-lock.json" ".github/aw/actions-lock.json"

            # Configure git auth for push (gh clone doesn't persist credentials)
            git config --local url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"

            # Check for changes
            git add .github/workflows/ .github/aw/
            if git diff --cached --quiet; then
              echo "| $repo | In sync | — |" >> "$GITHUB_STEP_SUMMARY"
              cd - > /dev/null
              rm -rf "$tmpdir"
              echo "::endgroup::"
              continue
            fi

            # Show what changed
            changed_files=$(git diff --cached --name-only | tr '\n' ', ' | sed 's/,$//')
            echo "  Changed: $changed_files"

            if [ "$DRY_RUN" = "true" ]; then
              echo "| $repo | **Would sync** (dry run) | $changed_files |" >> "$GITHUB_STEP_SUMMARY"
              cd - > /dev/null
              rm -rf "$tmpdir"
              echo "::endgroup::"
              continue
            fi

            # Create or update sync branch, push, and open PR
            # Wrapped in a subshell so a single repo failure doesn't stop the loop
            if (
              set -e
              git checkout -b "$SYNC_BRANCH" 2>/dev/null || git checkout "$SYNC_BRANCH" 2>/dev/null || git checkout -b "$SYNC_BRANCH"
              git \
                -c user.name="llm-d-infra-sync" \
                -c user.email="llm-d-infra-sync@users.noreply.github.com" \
                commit -s -m "$(cat <<EOF
          Sync gh-aw workflows from llm-d-infra (${COMMIT_SHA})

          Updated workflows:
          $(for wf in $GH_AW_WORKFLOWS; do echo "  - ${wf}.md + ${wf}.lock.yml"; done)

          Source: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          EOF
              )"
              git push --force origin "$SYNC_BRANCH"

              existing_pr=$(gh pr list --repo "$repo" --head "$SYNC_BRANCH" --state open --json url --jq '.[0].url' 2>/dev/null || echo "")

              if [ -n "$existing_pr" ]; then
                echo "| $repo | **PR updated** | [${existing_pr}](${existing_pr}) |" >> "$GITHUB_STEP_SUMMARY"
              else
                pr_url=$(gh pr create \
                  --repo "$repo" \
                  --head "$SYNC_BRANCH" \
                  --title "Sync gh-aw workflows from llm-d-infra" \
                  --body "$(cat <<'PRBODY'
          ## Automated gh-aw Workflow Sync

          This PR syncs the pre-compiled gh-aw workflows from [`llm-d/llm-d-infra`](https://github.com/llm-d/llm-d-infra).

          ### Synced workflows
          - `upstream-monitor.md` + `upstream-monitor.lock.yml` — daily upstream dependency monitor
          - `link-checker.md` + `link-checker.lock.yml` — PR link checker
          - `typo-checker.md` + `typo-checker.lock.yml` — PR typo checker

          ### What to do
          1. Review the diff
          2. Merge — no `gh aw compile` needed, lock files are pre-compiled

          > Created by the [sync workflow](https://github.com/llm-d/llm-d-infra/actions) in llm-d-infra.
          PRBODY
                )" 2>&1)

                echo "| $repo | **PR created** | [${pr_url}](${pr_url}) |" >> "$GITHUB_STEP_SUMMARY"
              fi
            ); then
              : # success
            else
              echo "::error::Failed to sync $repo"
              echo "| $repo | **Sync failed** | Check logs |" >> "$GITHUB_STEP_SUMMARY"
              FAIL_COUNT=$((FAIL_COUNT + 1))
            fi

            cd - > /dev/null 2>&1 || true
            rm -rf "$tmpdir"
            echo "::endgroup::"
          done <<< "$CONSUMING_REPOS"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "_Dry run: ${DRY_RUN} | Failures: ${FAIL_COUNT}_" >> "$GITHUB_STEP_SUMMARY"

          # Fail the job only if ALL repos failed
          total=$(echo "$CONSUMING_REPOS" | grep -c '[a-z]' || true)
          if [ "$FAIL_COUNT" -eq "$total" ]; then
            echo "::error::All repos failed to sync"
            exit 1
          fi
